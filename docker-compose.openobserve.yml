services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve
    restart: unless-stopped
    ports:
      - "54514:5080"
    environment:
      - ZO_ROOT_USER_EMAIL=admin@openobserve.local
      - ZO_ROOT_USER_PASSWORD=OpenObserve@2026
      - ZO_DATA_DIR=/data
    volumes:
      - openobserve-data:/data
    networks:
      - project-mgmt

volumes:
  openobserve-data:

networks:
  project-mgmt:
    external: true
