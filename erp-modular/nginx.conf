# ERP Modular — Nginx Config (Reverse Proxy + SSL)
# ใช้กับ Docker หรือ standalone
# วางที่ /etc/nginx/sites-available/erp-modular

server {
    listen 80;
    server_name erp.modular.local;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.modular.local;

    ssl_certificate     /etc/ssl/certs/erp-modular.crt;
    ssl_certificate_key /etc/ssl/private/erp-modular.key;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Micro-frontend Shell
    location / {
        proxy_pass http://127.0.0.1:8102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Gateway
    location /gateway/ {
        proxy_pass http://127.0.0.1:8102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files (cache นาน)
    location /static/ {
        proxy_pass http://127.0.0.1:8102;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8102;
        proxy_set_header Host $host;
        access_log off;
    }
}
