<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📸 Passport Photo</title>
<meta name="description" content="AI ปรับแต่งรูปถ่ายให้เป็น Passport Photo พร้อมพิมพ์">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
.container{max-width:1000px;margin:0 auto;padding:12px}
header{text-align:center;padding:16px 0 8px}
header h1{font-size:1.4em;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:#64748b;font-size:12px;margin-top:2px}

.tabs{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.tab{padding:7px 16px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;background:white;transition:all .15s}
.tab.active{border-color:#2563eb;color:#2563eb;background:#eff6ff}

.card{background:white;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:10px}
.card h2{font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:4px}

select{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:white}
.info{font-size:11px;color:#64748b;margin-top:4px}

.upload-zone{border:2px dashed #cbd5e1;border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:#2563eb;background:#f8faff}
.upload-zone.done{border-style:solid;border-color:#86efac;background:#f0fdf4;padding:6px}
.upload-zone img{max-width:100%;max-height:260px;border-radius:6px;display:block;margin:0 auto}

.camera-preview{width:100%;max-width:400px;margin:8px auto;background:#000;border-radius:8px;overflow:hidden}
.camera-preview video,.camera-preview canvas{width:100%;display:block}

.btn-group{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-blue{background:#2563eb;color:white}
.btn-blue:hover{background:#1d4ed8}
.btn-blue:disabled{opacity:.4;cursor:not-allowed}
.btn-green{background:#059669;color:white}
.btn-green:hover{background:#047857}
.btn-gray{background:#f1f5f9;color:#475569}
.btn-gray:hover{background:#e2e8f0}
.btn-block{width:100%;justify-content:center}
.btn-lg{padding:12px 20px;font-size:15px}

.options{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.options label{display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer;padding:4px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fafafa}
.options label:has(input:checked){border-color:#2563eb;background:#eff6ff}

.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.tag-b{background:#dbeafe;color:#1d4ed8}
.tag-g{background:#d1fae5;color:#059669}
.tag-p{background:#fce7f3;color:#be185d}

.spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:white;animation:s .6s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}

.result-img{max-width:300px;margin:8px auto}
.result-img img{width:100%;border-radius:8px;border:2px solid #e2e8f0}

.error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px;font-size:12px;color:#dc2626;margin-top:8px}
.hidden{display:none!important}
.mt-8{margin-top:8px}
.tc{text-align:center}

.print-grid{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.print-grid button{padding:5px 14px;border:2px solid #e2e8f0;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;background:white}
.print-grid button.on{border-color:#2563eb;color:#2563eb;background:#eff6ff}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:8px 20px;border-radius:8px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(min-width:768px){.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📸 Passport Photo</h1>
    <p>ถ่ายหรืออัปโหลดรูป → AI ปรับหน้า ตัดแสง Crop ลง Template + พิมพ์</p>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('p')">📷 Passport</div>
    <div class="tab" onclick="switchTab('r')">🛠️ ซ่อม</div>
  </div>

  <!-- ══════ PASSPORT ══════ -->
  <div id="tabP">
    <div class="card">
      <h2>📋 แบบ</h2>
      <select id="tsel" onchange="onTplChange()"></select>
      <div id="tdetail" class="info"></div>
    </div>

    <div class="card">
      <h2>📸 รูป</h2>

      <!-- Upload zone (visible by default) -->
      <div id="uploadZone" class="upload-zone" onclick="pickFile()">
        <div id="uploadPlaceholder">
          <div style="font-size:32px">📂</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">เลือกรูปภาพ</div>
          <div style="font-size:11px;color:#94a3b8">JPG / PNG</div>
        </div>
        <div id="uploadPreview" class="hidden"></div>
      </div>
      <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="onFilePick(event)">

      <!-- Camera -->
      <div id="cameraBox" class="camera-preview hidden">
        <video id="cam" autoplay playsinline muted></video>
      </div>

      <!-- Buttons -->
      <div class="btn-group">
        <button class="btn btn-gray" onclick="startCam()">📷 เปิดกล้อง</button>
        <button class="btn btn-blue" id="captureBtn" onclick="capture()" disabled>📸 ถ่าย</button>
        <button class="btn btn-gray" onclick="pickFile()">📂 อัปโหลด</button>
      </div>

      <div class="options">
        <label><input type="checkbox" id="oc" checked> Crop ใบหน้า</label>
        <label><input type="checkbox" id="oe" checked> ปรับแสง/สี</label>
        <label><input type="checkbox" id="oa" checked> 🤖 ปรับตรง+สวย</label>
      </div>

      <button class="btn btn-blue btn-block btn-lg" id="procBtn" onclick="process()" disabled>
        ✨ ประมวลผล Passport Photo
      </button>

      <div id="perror" class="error hidden"></div>
    </div>

    <!-- Result -->
    <div id="presult" class="hidden">
      <div class="card" style="border-color:#86efac">
        <h2 style="color:#059669">✅ เสร็จ</h2>
        <div class="result-img"><img id="pimg" alt="result"></div>
        <div id="ptags" class="tc" style="margin:6px 0"></div>
        <div class="btn-group">
          <a class="btn btn-green" id="pdl" download>⬇️ ดาวน์โหลด</a>
          <button class="btn btn-gray" onclick="showPrint()">🖨️ พิมพ์ Sheet</button>
          <button class="btn btn-gray" onclick="resetP()">🔄 ใหม่</button>
        </div>
        <div id="printSec" class="hidden" style="margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0">
          <div class="print-grid">
            <button class="on" data-s="4x6" onclick="setPS('4x6')">4×6"</button>
            <button data-s="5x7" onclick="setPS('5x7')">5×7"</button>
            <button data-s="a4" onclick="setPS('a4')">A4</button>
            <button data-s="a6" onclick="setPS('a6')">A6</button>
          </div>
          <button class="btn btn-blue btn-block mt-8" onclick="genPrint()">🖨️ สร้าง</button>
          <div id="printRes" class="hidden mt-8 tc">
            <img id="printImg" style="max-width:280px;border-radius:6px;border:1px solid #e2e8f0">
            <div id="printInfo" style="font-size:11px;color:#64748b;margin-top:4px"></div>
            <a class="btn btn-green mt-8" id="printDl" download>⬇️ ดาวน์โหลด</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════ RESTORE ══════ -->
  <div id="tabR" class="hidden">
    <div class="card">
      <h2>🖼️ เลือกรูปเก่า</h2>
      <div class="upload-zone" onclick="document.getElementById('rfile').click()">
        <div id="rplace">
          <div style="font-size:32px">🖼️</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">คลิกเลือกรูป</div>
        </div>
        <div id="rpreview" class="hidden"></div>
      </div>
      <input type="file" id="rfile" accept="image/*" class="hidden" onchange="onRPick(event)">
    </div>

    <div class="card">
      <h2>⚙️ ตั้งค่า</h2>
      <div style="display:grid;gap:6px">
        <div><label style="font-size:12px;font-weight:500">Denoise: <span id="rdv" style="color:#2563eb">50</span></label>
        <input type="range" id="rden" min="0" max="100" value="50" oninput="document.getElementById('rdv').textContent=this.value"></div>
        <div><label style="font-size:12px;font-weight:500">Sharpen: <span id="rsv" style="color:#2563eb">50</span></label>
        <input type="range" id="rsh" min="0" max="100" value="50" oninput="document.getElementById('rsv').textContent=this.value"></div>
        <select id="rup">
          <option value="1">1x</option>
          <option value="2">2x</option>
          <option value="4">4x</option>
        </select>
      </div>
      <div class="options mt-8">
        <label><input type="checkbox" id="rin" checked> ซ่อมรอย</label>
        <label><input type="checkbox" id="rco" checked> ปรับสี</label>
        <label><input type="checkbox" id="rfa"> คมเฉพาะหน้า</label>
      </div>
    </div>

    <button class="btn btn-blue btn-block btn-lg" id="rbtn" onclick="doRestore()" disabled>🔧 ซ่อมแซม</button>
    <div id="rerr" class="error hidden"></div>
    <div id="rres" class="hidden mt-8">
      <div class="card" style="border-color:#86efac">
        <h2 style="color:#059669">✅ ซ่อมเสร็จ</h2>
        <div class="result-img"><img id="rimg" alt="restored"></div>
        <div id="rtags" class="tc" style="margin:6px 0"></div>
        <div class="btn-group">
          <a class="btn btn-green" id="rdl" download>⬇️ ดาวน์โหลด</a>
          <button class="btn btn-gray" onclick="resetR()">🔄 ใหม่</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{})

const A='/api/passport'
let b64=null, sid=null, ps='4x6', rb64=null, stream=null
let camReady=false

function q(s){return document.getElementById(s)}

function toasty(m){const t=q('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function switchTab(t){q('tabP').classList.toggle('hidden',t!=='p');q('tabR').classList.toggle('hidden',t!=='r');document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active',e.textContent.includes(t==='p'?'📷':'🛠')))}

// ══ Templates ══
async function loadTpl(){
  try{
    const r=await fetch(A+'/templates');const d=await r.json()
    if(!d.ok)return
    const sel=q('tsel')
    d.templates.sort((a,b)=>a.country.localeCompare(b.country)).forEach(t=>{const o=document.createElement('option');o.value=t.code;o.textContent=t.country+' — '+t.name;sel.appendChild(o)})
    if([...sel.options].find(o=>o.value==='thai_id'))sel.value='thai_id'
    onTplChange()
  }catch(e){console.error(e)}
}
loadTpl()
function onTplChange(){const o=q('tsel').selectedOptions[0];q('tdetail').textContent=o?'📐 '+o.textContent:''}

// ══ Upload ══
function pickFile(){q('fileInput').click()}
function onFilePick(e){
  const f=e.target.files[0];if(!f)return
  const r=new FileReader()
  r.onload=ev=>{b64=ev.target.result.split(',')[1];showUploadPreview(ev.target.result);q('procBtn').disabled=false;toasty('📂 '+f.name)}
  r.readAsDataURL(f)
}
function showUploadPreview(url){
  q('uploadPlaceholder').classList.add('hidden')
  const p=q('uploadPreview');p.classList.remove('hidden');p.innerHTML='<img src="'+url+'">'
  q('uploadZone').classList.add('done')
}

// ══ Camera ══
async function startCam(){
  try{
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
    camReady=false;q('captureBtn').disabled=true
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:1280}}})
    const v=q('cam');v.srcObject=stream
    // Wait for camera to adjust exposure
    await new Promise(r=>{
      if(v.videoWidth>0)r()
      else v.onloadedmetadata=()=>{v.play();setTimeout(r,1200)}
    })
    q('cameraBox').classList.remove('hidden')
    camReady=true;q('captureBtn').disabled=false
    toasty('📷 กล้องพร้อม')
  }catch(e){toasty('❌ '+e.message)}
}
function capture(){
  if(!camReady){toasty('⚠️ กล้องยังไม่พร้อม');return}
  const v=q('cam'),c=document.createElement('canvas')
  c.width=v.videoWidth;c.height=v.videoHeight
  const ctx=c.getContext('2d')
  // Draw with slight brightening
  ctx.drawImage(v,0,0)
  const url=c.toDataURL('image/jpeg',0.95)
  b64=url.split(',')[1]
  showUploadPreview(url)
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  q('cameraBox').classList.add('hidden')
  q('procBtn').disabled=false
  toasty('📸 ถ่ายแล้ว')
}

// ══ Process ══
async function process(){
  if(!b64){toasty('⚠️ เลือกรูปก่อน');return}
  const btn=q('procBtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> กำลังทำ...'
  q('presult').classList.add('hidden');q('perror').classList.add('hidden')
  try{
    const r=await fetch(A+'/process',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        image_base64:b64,
        template_code:q('tsel').value,
        auto_crop:q('oc').checked,
        enhance:q('oe').checked,
        auto_align:q('oa').checked,
      })
    })
    const d=await r.json()
    if(!d.ok)throw new Error(d.error||d.detail||'Error')
    sid=d.session_id
    const dl=A+'/download/'+d.session_id+'.jpg'
    q('pimg').src=dl+'?t='+Date.now()
    q('pdl').href=dl;q('pdl').download='passport_'+(d.template?.country||'photo')+'.jpg'
    const i=d.info||{},t=d.template||{}
    const tags=[]
    tags.push('<span class="tag tag-b">'+(t.country||q('tsel').value)+'</span>')
    if(i.dimensions_px)tags.push('<span class="tag tag-b">'+(i.dimensions_px.w||'?')+'×'+(i.dimensions_px.h||'?')+'px</span>')
    if(i.align?.rotated)tags.push('<span class="tag tag-g">🔄 เอียง '+i.align.angle+'°</span>')
    if(i.beauty)tags.push('<span class="tag tag-p">✨ สวย</span>')
    if(i.bg_removed)tags.push('<span class="tag tag-g">🔵 ตัดพื้น</span>')
    q('ptags').innerHTML=tags.join('')
    q('presult').classList.remove('hidden');q('printSec').classList.add('hidden')
    toasty('✅ เสร็จ!')
  }catch(e){
    q('perror').textContent='❌ '+e.message;q('perror').classList.remove('hidden')
  }
  btn.disabled=false;btn.innerHTML='✨ ประมวลผล Passport Photo'
}
function resetP(){
  b64=null;sid=null;q('presult').classList.add('hidden');q('procBtn').disabled=true
  q('uploadPreview').innerHTML='';q('uploadPreview').classList.add('hidden');q('uploadPlaceholder').classList.remove('hidden')
  q('uploadZone').classList.remove('done');q('fileInput').value=''
}

// ══ Print ══
function showPrint(){q('printSec').classList.toggle('hidden')}
function setPS(s){ps=s;document.querySelectorAll('.print-grid button').forEach(b=>b.classList.toggle('on',b.dataset.s===s))}
async function genPrint(){
  if(!sid)return
  const btn=q('#printSec .btn-blue');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>...'
  try{
    const r=await fetch(A+'/print-sheet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid,print_size:ps})})
    const d=await r.json();if(!d.ok)throw new Error(d.error)
    const dl=A+'/download/'+sid+'_print.jpg?t='+Date.now()
    q('printImg').src=dl;q('printDl').href=dl;q('printDl').download='passport_print_'+ps+'.jpg'
    q('printRes').classList.remove('hidden')
    const pi=d.info||{};q('printInfo').textContent=(pi.print_size||ps)+' | '+(pi.cols||'?')+'×'+(pi.rows||'?')+' = '+(pi.count||'?')+' รูป'
    toasty('🖨️ พร้อม')
  }catch(e){q('perror').textContent='❌ '+e.message;q('perror').classList.remove('hidden')}
  btn.disabled=false;btn.innerHTML='🖨️ สร้าง Print Sheet'
}

// ══ Restore ══
function onRPick(e){
  const f=e.target.files[0];if(!f)return
  const r=new FileReader()
  r.onload=ev=>{
    rb64=ev.target.result.split(',')[1]
    q('rplace').classList.add('hidden')
    const p=q('rpreview');p.classList.remove('hidden');p.innerHTML='<img src="'+ev.target.result+'">'
    q('rbtn').disabled=false
  }
  r.readAsDataURL(f)
}
async function doRestore(){
  if(!rb64){toasty('⚠️ เลือกรูปก่อน');return}
  const btn=q('rbtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> กำลังซ่อม...'
  q('rres').classList.add('hidden');q('rerr').classList.add('hidden')
  try{
    const r=await fetch(A+'/restore',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      image_base64:rb64,denoise_strength:parseInt(q('rden').value)/100,sharpen_strength:parseInt(q('rsh').value)/100,
      inpaint_scratches:q('rin').checked,color_restore:q('rco').checked,upscale_factor:parseInt(q('rup').value),enhance_face:q('rfa').checked,
    })})
    const d=await r.json();if(!d.ok)throw new Error(d.error||d.detail)
    const dl=A+'/download/'+d.session_id+'_restored.jpg?t='+Date.now()
    q('rimg').src=dl;q('rdl').href=dl;q('rdl').download='restored_'+d.session_id+'.jpg'
    const i=d.info||{},p=[];if(i.denoise)p.push('ลด noise');if(i.inpaint)p.push('ซ่อมรอย');if(i.color_restored)p.push('ปรับสี');if(i.upscaled)p.push('x'+i.upscaled)
    q('rtags').innerHTML=p.map(x=>'<span class="tag tag-g">'+x+'</span>').join('')
    q('rres').classList.remove('hidden');toasty('✅ ซ่อมเสร็จ')
  }catch(e){q('rerr').textContent='❌ '+e.message;q('rerr').classList.remove('hidden')}
  btn.disabled=false;btn.innerHTML='🔧 ซ่อมแซม'
}
function resetR(){
  rb64=null;q('rres').classList.add('hidden');q('rbtn').disabled=true
  q('rpreview').innerHTML='';q('rpreview').classList.add('hidden');q('rplace').classList.remove('hidden');q('rfile').value=''
}
</script>
</body>
</html>
