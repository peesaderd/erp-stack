<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Passport Photo AI</title>
<script>// ล้าง Service Worker เก่า — cache หน้าเก่าทิ้ง
if('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(rs) {
    for(var r of rs) r.unregister();
  });
  navigator.serviceWorker.register('/sw.js?v='+Date.now());
}
// force reload หน้าเว็บถ้ามาจาก cache
window.addEventListener('pageshow', function(e) {
  if(e.persisted) window.location.reload();
});
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
  --border: #475569; --text: #f1f5f9; --dim: #94a3b8;
  --accent: #6366f1; --accent-hover: #818cf8;
  --radius: 12px; --sm: 8px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Thai', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 20px; display: flex; align-items: center; gap: 10px;
}
header h1 { font-size: 1.15rem; font-weight: 700; }
header h1 span { color: var(--accent); }
header .badge {
  font-size: .65rem; background: var(--accent); color: #fff;
  padding: 2px 8px; border-radius: 10px; font-weight: 600;
}
main { max-width: 700px; margin: 0 auto; padding: 20px 16px 60px; }

.card {
  background: var(--surface); border-radius: var(--radius);
  padding: 20px; margin-bottom: 16px;
}
.card-title { font-size: .85rem; color: var(--dim); margin-bottom: 12px; font-weight: 600; }

/* Upload */
.upload-box {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 32px 20px; text-align: center; cursor: pointer;
  transition: all .2s; position: relative;
}
.upload-box:hover { border-color: var(--accent); background: rgba(99,102,241,.08); }
.upload-box .icon { font-size: 2.5rem; margin-bottom: 6px; }
.upload-box .label { font-weight: 600; }
.upload-box .hint { font-size: .8rem; color: var(--dim); margin-top: 4px; }
.upload-box input { display: none; }
.upload-box.has-img { border-style: solid; padding: 12px; }
.upload-preview {
  max-width: 200px; max-height: 200px; border-radius: var(--sm);
  margin: 0 auto; display: block; object-fit: contain;
}
.upload-box .remove-btn {
  margin-top: 8px; background: none; border: 1px solid var(--border);
  color: var(--dim); padding: 4px 14px; border-radius: var(--sm);
  cursor: pointer; font-size: .8rem;
}
.upload-box .remove-btn:hover { border-color: #ef4444; color: #ef4444; }

/* Select */
select, textarea {
  width: 100%; padding: 10px 12px; border-radius: var(--sm);
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: .9rem; outline: none;
  transition: border .2s;
}
select:focus, textarea:focus { border-color: var(--accent); }
textarea {
  resize: vertical; min-height: 60px; font-family: inherit;
}

/* Grid 2 col */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 500px) { .grid-2 { grid-template-columns: 1fr; } }

/* Button */
.btn {
  width: 100%; padding: 14px; border: none; border-radius: var(--sm);
  font-size: 1.05rem; font-weight: 700; cursor: pointer;
  transition: all .2s; display: flex; align-items: center;
  justify-content: center; gap: 8px;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-success { background: #22c55e; color: #fff; }
.btn-success:hover:not(:disabled) { filter: brightness(1.1); }
.spinner {
  width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Result */
.result { display: none; }
.result.show { display: block; }
.result img {
  width: 100%; max-height: 340px; object-fit: contain;
  border-radius: var(--sm); background: var(--bg);
}
.result-actions { display: flex; gap: 10px; margin-top: 12px; }
.result-actions .btn { flex: 1; }
.result-info {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 8px; margin: 12px 0;
}
.result-info div {
  background: var(--surface2); border-radius: var(--sm);
  padding: 10px; text-align: center;
}
.result-info .val { font-size: 1rem; font-weight: 700; color: var(--accent); }
.result-info .lbl { font-size: .7rem; color: var(--dim); margin-top: 2px; }

/* Steps indicator */
.steps {
  display: flex; gap: 8px; margin-bottom: 20px; font-size: .75rem;
}
.steps span {
  flex: 1; text-align: center; padding: 6px; border-radius: var(--sm);
  background: var(--surface2); color: var(--dim);
}
.steps span.active { background: var(--accent); color: #fff; }
.steps span.done { background: #22c55e; color: #fff; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 20px;
  display: none; z-index: 999; max-width: 90%;
}
.toast.show { display: flex; align-items: center; gap: 8px; }
.toast.error { border-color: #ef4444; }

/* Overlay */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,23,42,.85); z-index: 998;
  justify-content: center; align-items: center; flex-direction: column; gap: 16px;
}
.overlay.show { display: flex; }
.overlay .spinner-lg { width: 44px; height: 44px; border-width: 4px; }
</style>
</head>
<body>

<header>
  <h1><span>AI</span> Passport Photo</h1>
  <span class="badge">AI</span>
</header>

<div class="overlay" id="overlay">
  <div class="spinner spinner-lg"></div>
  <div id="overlayText" style="color:var(--text);font-size:1rem;">กำลังสร้างรูปด้วย AI...</div>
</div>

<div class="toast" id="toast"></div>

<main>
  <div class="steps">
    <span id="s1" class="active">1. รูป</span>
    <span id="s2">2. เลือกประเทศ</span>
    <span id="s3">3. AI สร้าง</span>
    <span id="s4">4. เสร็จ</span>
  </div>

  <!-- Step 1: Upload photo -->
  <div class="card">
    <div class="card-title">📸 อัปโหลดรูปถ่ายของคุณ</div>
    <div class="upload-box" id="photoUpload">
      <div id="photoEmpty">
        <div class="icon">🙋</div>
        <div class="label">เลือกรูปถ่าย</div>
        <div class="hint">ถ่ายรูปตรงๆ ไม่ต้องมีพื้นหลังพิเศษ</div>
      </div>
      <div id="photoPreview" style="display:none">
        <img class="upload-preview" id="photoImg" alt="photo">
        <button class="remove-btn" id="photoRemove">เปลี่ยนรูป</button>
      </div>
      <input type="file" id="photoInput" accept="image/jpeg,image/png">
    </div>
  </div>

  <!-- Step 2: Template + Prompt + Reference -->
  <div class="card">
    <div class="card-title">🌍 ขนาดประเทศ</div>
    <select id="templateSelect"></select>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">💬 Prompt (ไม่ใส่ก็ได้)</div>
      <textarea id="promptInput" placeholder="เช่น ใส่สูทสีดำ, ไว้หนวด, ยิ้มเล็กน้อย"></textarea>
    </div>
    <div class="card">
      <div class="card-title">👔 รูปชุดตัวอย่าง (ไม่ใส่ก็ได้)</div>
      <div class="upload-box" id="refUpload">
        <div id="refEmpty">
          <div class="icon">👕</div>
          <div class="hint">เลือกรูปชุดที่อยากใส่</div>
        </div>
        <div id="refPreview" style="display:none">
          <img class="upload-preview" id="refImg" alt="reference" style="max-height:100px">
          <button class="remove-btn" id="refRemove">ลบ</button>
        </div>
        <input type="file" id="refInput" accept="image/jpeg,image/png">
      </div>
    </div>
  </div>

  <!-- Generate button -->
  <button class="btn btn-primary" id="genBtn" disabled>
    ✨ AI Generate
  </button>

  <!-- Result -->
  <div class="card result" id="resultCard">
    <div class="card-title">✅ ผลลัพธ์</div>
    <div class="result-info" id="resultInfo"></div>
    <img id="resultImg" alt="Passport Photo">
    <div class="result-actions">
      <button class="btn btn-success" id="dlPassport">⬇️ รูป</button>
      <button class="btn btn-success" id="dlPrint">🖨️ แผ่นพิมพ์</button>
    </div>
  </div>
</main>

<script>
const API = '/api/passport';
const $ = id => document.getElementById(id);
let state = { photo: null, ref: null, templates: [], sessionId: null };

async function init() {
  await loadTemplates();
  setupUploads();
  setupGen();
}

async function loadTemplates() {
  try {
    const r = await fetch(`${API}/templates`);
    const d = await r.json();
    state.templates = d.templates || [];
    const sel = $('templateSelect');
    const groups = {};
    for (const t of state.templates) {
      const g = t.country || 'Other';
      if (!groups[g]) groups[g] = [];
      groups[g].push(t);
    }
    const order = ['Thailand','United States','United Kingdom','China','Japan','South Korea'];
    for (const c of order) {
      if (groups[c]) { addGroup(sel, c, groups[c]); delete groups[c]; }
    }
    for (const [c, ts] of Object.entries(groups).sort()) addGroup(sel, c, ts);
    sel.value = 'thai_passport';
  } catch(e) {
    showToast('โหลดประเทศไม่สำเร็จ', 'error');
  }
}
function addGroup(sel, country, templates) {
  const og = document.createElement('optgroup');
  og.label = country === 'Thailand' ? '🇹🇭 ไทย' : country;
  for (const t of templates.sort((a,b) => a.name.localeCompare(b.name, 'th'))) {
    const opt = document.createElement('option');
    opt.value = t.code;
    opt.textContent = `${t.name} (${t.width_mm}×${t.height_mm}mm)`;
    og.appendChild(opt);
  }
  sel.appendChild(og);
}

function setupUploads() {
  // Main photo
  setupUpload('photo', (file) => state.photo = file);
  setupUpload('ref', (file) => state.ref = file);
}
function setupUpload(prefix, onFile) {
  const zone = $(`${prefix}Upload`);
  const input = $(`${prefix}Input`);
  const preview = $(`${prefix}Preview`);
  const img = $(`${prefix}Img`);
  const remove = $(`${prefix}Remove`);
  const empty = $(`${prefix}Empty`);

  zone.addEventListener('click', (e) => {
    if (!e.target.closest('button')) input.click();
  });
  input.addEventListener('change', () => {
    if (input.files[0]) handleUpload(input.files[0]);
  });
  if (remove) remove.addEventListener('click', (e) => {
    e.stopPropagation();
    state[prefix] = null; input.value = '';
    empty.style.display = 'block'; preview.style.display = 'none';
    zone.classList.remove('has-img');
    updateGenBtn();
  });

  function handleUpload(file) {
    if (!file.type.match(/^image\/(jpeg|png)$/)) {
      showToast('เฉพาะ JPG/PNG', 'error'); return;
    }
    if (file.size > 10*1024*1024) { showToast('ไฟล์ใหญ่เกิน 10MB','error'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      onFile(e.target.result);
      if (img) img.src = e.target.result;
      if (prefix === 'photo') {
        $('s1').className = 'done';
        $('s2').className = 'active';
      }
      empty.style.display = 'none'; preview.style.display = 'block';
      zone.classList.add('has-img');
      updateGenBtn();
    };
    reader.readAsDataURL(file);
  }
}

function updateGenBtn() {
  $('genBtn').disabled = !state.photo;
}

function setupGen() {
  $('genBtn').addEventListener('click', generate);
  $('dlPassport').addEventListener('click', () => dl('passport'));
  $('dlPrint').addEventListener('click', () => dl('print'));
}

async function generate() {
  if (!state.photo) return;
  const b64 = state.photo.split(',')[1];
  const refB64 = state.ref ? state.ref.split(',')[1] : '';
  const prompt = $('promptInput').value.trim();

  showOverlay('🤖 AI กำลังวิเคราะห์รูปและสร้างพาสปอร์ต...');
  $('s2').className = 'done';
  $('s3').className = 'active';

  try {
    const r = await fetch(`${API}/ai-generate`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        image_base64: b64,
        template_code: $('templateSelect').value,
        prompt: prompt,
        reference_image_base64: refB64
      })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.detail || 'Error');

    state.sessionId = d.session_id;
    const info = d.info || {};

    $('resultInfo').innerHTML = `
      <div><div class="val">${info.time_seconds || '?'}s</div><div class="lbl">⏱ เวลา</div></div>
      <div><div class="val">${d.dimensions?.w || '?'}×${d.dimensions?.h || '?'}</div><div class="lbl">📐 mm</div></div>
      <div><div class="val">${info.final_size?.[0] || '?'}×${info.final_size?.[1] || '?'}</div><div class="lbl">🖼 px</div></div>
      <div><div class="val">300</div><div class="lbl">🔲 DPI</div></div>
    `;
    $('resultImg').src = `${API}/download/${d.session_id}_passport.jpg?t=${Date.now()}`;

    $('s3').className = 'done';
    $('s4').className = 'active';
    $('resultCard').classList.add('show');
    $('resultCard').scrollIntoView({behavior:'smooth'});
    showToast('✅ เสร็จแล้ว!');
  } catch(e) {
    showToast(`❌ ${e.message || 'Error'}`, 'error');
    $('s3').className = '';
  } finally {
    hideOverlay();
  }
}

function dl(type) {
  if (!state.sessionId) return;
  const suffix = type === 'passport' ? 'passport' : 'print';
  const a = document.createElement('a');
  a.href = `${API}/download/${state.sessionId}_${suffix}.jpg`;
  a.download = `passport_${state.sessionId}.jpg`;
  a.click();
}

let toastTimeout;
function showToast(msg, type='') {
  clearTimeout(toastTimeout);
  const t = $('toast');
  t.className = `toast show ${type}`;
  t.innerHTML = `<span>${msg}</span>`;
  toastTimeout = setTimeout(() => t.classList.remove('show'), 4000);
}
function showOverlay(t) { $('overlayText').textContent = t; $('overlay').classList.add('show'); }
function hideOverlay() { $('overlay').classList.remove('show'); }

init();
</script>
</body>
</html>
