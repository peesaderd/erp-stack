<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Product Analyzer — ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b1121;--bg2:#131d33;--bg3:#1a2942;--surface:#0f1a2e;--border:#243652;--text:#e8edf5;--text2:#8899b4;--accent:#14b8a6;--accent2:#0d9488;--red:#ef4444;--yellow:#f59e0b;--green:#22c55e;--blue:#3b82f6;--radius:10px}
html{font-size:15px}
body{font-family:'Noto Sans Thai','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;line-height:1.5}
img,svg{max-width:100%}

.header{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;white-space:nowrap}
.header h1 small{font-size:11px;font-weight:400;color:var(--text2);display:none}
.header-actions{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--radius);border:none;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;font-family:inherit;white-space:nowrap;line-height:1;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--text2);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}

.container{max-width:1280px;margin:0 auto;padding:12px 16px;width:100%;flex:1}

.chips-grid{display:flex;gap:6px;margin-bottom:12px;flex-wrap:nowrap}
.chip{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;display:flex;flex-direction:column;gap:2px;overflow:hidden}
.chip-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-value{font-size:15px;font-weight:700;color:var(--text);line-height:1.2}
.chip-value.accent{color:var(--accent)}
.chip-value.yellow{color:var(--yellow)}
.chip-value.green{color:var(--green)}

.tab-bar{display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 16px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-size:13px;transition:.15s;background:none;border-top:0;border-left:0;border-right:0;font-family:inherit;font-weight:500;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.filter-bar select,.filter-bar input{padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;font-family:inherit;min-height:36px}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--accent)}
.filter-bar .search-wrap{flex:1;min-width:140px;position:relative}
.filter-bar .search-wrap input{width:100%;padding-left:30px}
.filter-bar .search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text2);pointer-events:none}

.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
th{background:var(--bg2);padding:9px 10px;text-align:left;color:var(--text2);font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border);font-size:12px}
td{padding:9px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
table tbody tr{cursor:pointer}

.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-teal{background:rgba(20,184,166,.15);color:var(--accent)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue)}
code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--text2)}

.empty-state{padding:32px 16px;text-align:center;color:var(--text2);font-size:14px}
.empty-state svg{width:40px;height:40px;margin-bottom:8px;opacity:.4}
.alert{padding:10px 14px;border-radius:var(--radius);margin-bottom:12px;font-size:13px;display:flex;align-items:center;gap:8px}
.alert-error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.alert-success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.alert-info{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:var(--blue);flex-wrap:wrap}
.alert-info .btn{margin-left:auto}
.loading-state{padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text2)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:6px}
.skel-h{height:14px;width:100%}
.skel-chip{height:48px;width:100%}
.skel-row{height:36px;width:100%;margin-bottom:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.chips-skel{display:flex;gap:6px;margin-bottom:12px}
.chips-skel .skel{border:1px solid var(--border)}
.chips-skel .skel-chip{flex:1}

.platform-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.platform-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.platform-card .p-name{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.platform-card .p-stats{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2)}
.platform-card .p-stats span{white-space:nowrap}
.platform-card .p-count{font-size:24px;font-weight:700;color:var(--accent);line-height:1.2;margin-bottom:4px}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.modal-overlay.open{opacity:1;visibility:visible}
.modal-content{background:var(--bg2);border:1px solid var(--border);border-radius:12px;max-width:480px;width:92%;max-height:85vh;overflow-y:auto;padding:0;transform:scale(.93);transition:transform .2s}
.modal-overlay.open .modal-content{transform:scale(1)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1;border-radius:12px 12px 0 0}
.modal-header h3{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:0;line-height:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:.15s}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-body{padding:16px 20px 20px}
.detail-row{display:flex;padding:10px 0;border-bottom:1px solid rgba(36,54,82,.5);align-items:flex-start;gap:12px}
.detail-row:last-child{border-bottom:none;padding-bottom:0}
.detail-label{flex:0 0 100px;font-size:12px;color:var(--text2);font-weight:500;padding-top:2px}
.detail-value{flex:1;font-size:13px;color:var(--text);word-break:break-word}
.detail-value a{color:var(--accent);text-decoration:none}
.detail-value a:hover{text-decoration:underline}
.kw-list{display:flex;flex-wrap:wrap;gap:4px}
.kw-tag{background:var(--bg3);padding:3px 10px;border-radius:12px;font-size:11px;color:var(--accent)}
.modal-footer{padding:12px 20px 16px;border-top:1px solid var(--border);text-align:right}

@media(min-width:640px){
  .chip{padding:12px 14px}
  .chip-label{font-size:11px;letter-spacing:.5px}
  .chip-value{font-size:20px}
  .skel-chip{height:64px}
  .platform-cards{grid-template-columns:repeat(3,1fr)}
  .header h1 small{display:inline}
  .container{padding:16px 24px}
}
@media(min-width:1024px){
  .platform-cards{grid-template-columns:repeat(4,1fr)}
  .container{padding:20px 32px}
}
@media(max-width:400px){
  .chips-grid{gap:4px}
  .chip{padding:6px 8px}
  .chip-label{font-size:8px}
  .chip-value{font-size:13px}
  .tab-btn{padding:10px 12px;font-size:12px}
}
</style>
</head>
<body>

<header class="header">
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    Product Analyzer
    <small>ERP Dashboard</small>
  </h1>
  <div class="header-actions">
    <button class="btn btn-outline btn-sm" onclick="refreshAll()">⟳ โหลดใหม่</button>
  </div>
</header>

<div class="container">

<div id="chipsContainer">
  <div class="chips-skel" id="chipsSkel">
    <div class="skel skel-chip"></div><div class="skel skel-chip"></div>
    <div class="skel skel-chip"></div><div class="skel skel-chip"></div>
  </div>
</div>

<div class="tab-bar" role="tablist">
  <button class="tab-btn active" data-tab="raw" role="tab">ข้อมูลดิบ</button>
  <button class="tab-btn" data-tab="analyzed" role="tab">วิเคราะห์แล้ว</button>
  <button class="tab-btn" data-tab="platforms" role="tab">แยกตาม Platform</button>
</div>

<div id="panel-raw" class="tab-panel active" role="tabpanel">
  <div class="filter-bar">
    <select id="srcFilter">
      <option value="">ทุก Platform</option>
      <option value="shopee">🛒 Shopee</option>
      <option value="lazada">📦 Lazada</option>
      <option value="tiktok">🎵 TikTok</option>
      <option value="amazon">📘 Amazon</option>
      <option value="facebook">👍 Facebook</option>
    </select>
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="srcSearch" placeholder="ค้นหาสินค้า…">
    </div>
    <button class="btn btn-outline btn-sm" onclick="loadRaw()">ค้นหา</button>
    <button class="btn btn-primary btn-sm" onclick="analyzeAll()">🚀 วิเคราะห์</button>
  </div>
  <div id="rawAlert"></div>
  <div id="rawTableWrap" class="table-wrap">
    <table>
      <thead><tr>
        <th style="width:32px"><input type="checkbox" id="rawSelectAll" onchange="toggleAllRaw()"></th>
        <th>ชื่อสินค้า</th><th>Platform</th><th>SKU</th><th>ราคา</th><th>สถานะ</th><th>วันที่</th><th></th>
      </tr></thead>
      <tbody id="rawBody"></tbody>
    </table>
    <div class="empty-state" id="rawEmpty">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      <div>ยังไม่มีข้อมูลที่ดึงมา</div>
    </div>
  </div>
</div>

<div id="panel-analyzed" class="tab-panel" role="tabpanel">
  <div class="filter-bar">
    <select id="anSrcFilter">
      <option value="">ทุก Platform</option>
      <option value="shopee">🛒 Shopee</option>
      <option value="lazada">📦 Lazada</option>
      <option value="tiktok">🎵 TikTok</option>
      <option value="amazon">📘 Amazon</option>
      <option value="facebook">👍 Facebook</option>
    </select>
    <select id="anCatFilter"><option value="">ทุกหมวด</option></select>
    <input type="number" id="anMinRating" placeholder="คะแนนขั้นต่ำ" style="width:120px" min="0" max="5" step="0.5">
    <select id="anTrendFilter">
      <option value="">ทั้งหมด</option>
      <option value="trending">🔥 กำลังมาแรง</option>
      <option value="notrending">❄️ ทั่วไป</option>
    </select>
    <button class="btn btn-outline btn-sm" onclick="loadAnalyzed()">ค้นหา</button>
  </div>
  <div id="anAlert"></div>
  <div id="anTableWrap" class="table-wrap">
    <table>
      <thead><tr>
        <th>ชื่อสินค้า</th><th>Platform</th><th>ราคา</th><th>คะแนน</th><th>ยอดขาย</th>
        <th>ไวรัล</th><th>คอมมิชชั่น</th><th>หมวด</th><th>แนวโน้ม</th><th>คำค้น</th>
      </tr></thead>
      <tbody id="anBody"></tbody>
    </table>
    <div class="empty-state" id="anEmpty">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      <div>ยังไม่ได้วิเคราะห์สินค้า</div>
    </div>
  </div>
</div>

<div id="panel-platforms" class="tab-panel" role="tabpanel">
  <div id="platformContent">
    <div class="loading-state"><div class="spinner"></div><span>กำลังโหลดสถิติ…</span></div>
  </div>
</div>

</div>

<div id="productModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">รายละเอียดสินค้า</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">ปิด</button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api/scraper/api/v1';
let rawData = [];
let anData = [];

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'platforms') loadPlatformStats();
    if (tab === 'analyzed' && anData.length === 0) loadAnalyzed();
    if (tab === 'raw' && rawData.length === 0) loadRaw();
  });
});

function closeModal() {
  document.getElementById('productModal').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function showRawModal(p) {
  const platform = p.source_site || 'ไม่ระบุ';
  const icon = platformIcon(platform);
  document.getElementById('modalTitle').textContent = '📄 รายละเอียด (ข้อมูลดิบ)';
  var imgHtml = '';
  if (p.images && p.images.length) {
    imgHtml = '<div class="detail-row"><div class="detail-label">รูปภาพ</div><div class="detail-value"><div style="display:flex;gap:6px;flex-wrap:wrap">' +
      p.images.slice(0,5).map(function(u){return '<img src="'+escAttr(u)+'" style="width:60px;height:60px;object-fit:cover;border-radius:6px" onerror="this.style.display=\'none\'">'}).join('') +
      '</div></div></div>';
  }
  document.getElementById('modalBody').innerHTML =
    imgHtml +
    '<div class="detail-row"><div class="detail-label">ชื่อสินค้า</div><div class="detail-value"><strong>' + esc(p.name||'—') + '</strong></div></div>' +
    '<div class="detail-row"><div class="detail-label">Platform</div><div class="detail-value"><span class="badge badge-teal">' + icon + ' ' + esc(platform) + '</span></div></div>' +
    '<div class="detail-row"><div class="detail-label">ราคา</div><div class="detail-value">' + fmtPrice(p.price) + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">SKU / ID</div><div class="detail-value"><code>' + esc(p.sku||p.id||'—') + '</code></div></div>' +
    '<div class="detail-row"><div class="detail-label">รายละเอียด</div><div class="detail-value">' + esc(p.description||'—') + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">วันที่ Scrape</div><div class="detail-value">' + fmtDate(p.scraped_at) + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">สถานะ</div><div class="detail-value">' + (p.has_analyzed ? '<span class="badge badge-green">✔ วิเคราะห์แล้ว</span>' : '<span class="badge badge-yellow">⏳ รอวิเคราะห์</span>') + '</div></div>' +
    (p.url ? '<div class="detail-row"><div class="detail-label">URL</div><div class="detail-value"><a href="' + escAttr(p.url) + '" target="_blank" rel="noopener">🔗 ' + esc(p.url) + '</a></div></div>' : '');
  document.getElementById('productModal').classList.add('open');
}

function showAnalyzedModal(p) {
  const vc = p.viral_score >= 70 ? 'color:var(--green);font-weight:700' : p.viral_score >= 30 ? 'color:var(--yellow);font-weight:600' : 'color:var(--text2)';
  const kwHtml = p.keywords && p.keywords.length ? p.keywords.map(function(k){return '<span class="kw-tag">'+esc(k)+'</span>'}).join('') : '<span style="color:var(--text2)">—</span>';
  var imgHtml = '';
  if (p.images && p.images.length) {
    imgHtml = '<div class="detail-row"><div class="detail-label">รูปภาพ</div><div class="detail-value"><div style="display:flex;gap:6px;flex-wrap:wrap">' +
      p.images.slice(0,5).map(function(u){return '<img src="'+escAttr(u)+'" style="width:60px;height:60px;object-fit:cover;border-radius:6px" onerror="this.style.display=\'none\'">'}).join('') +
      '</div></div></div>';
  }
  document.getElementById('modalTitle').textContent = '📊 รายละเอียด (วิเคราะห์แล้ว)';
  var html =
    imgHtml +
    '<div class="detail-row"><div class="detail-label">ชื่อสินค้า</div><div class="detail-value"><strong>' + esc(p.title||'—') + '</strong></div></div>' +
    '<div class="detail-row"><div class="detail-label">Platform</div><div class="detail-value"><span class="badge badge-teal">' + platformIcon(p.source) + ' ' + esc(p.source||'ไม่ระบุ') + '</span></div></div>' +
    '<div class="detail-row"><div class="detail-label">ร้านค้า</div><div class="detail-value">' + esc(p.seller_name||'—') + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">ราคา</div><div class="detail-value">' + fmtPrice(p.price_thb) + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">คะแนน</div><div class="detail-value">' + (p.rating != null ? '⭐ ' + p.rating : '—') + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">ยอดขาย</div><div class="detail-value">' + (p.sold_total != null ? Number(p.sold_total).toLocaleString() : '—') + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">คะแนนไวรัล</div><div class="detail-value" style="' + vc + ';font-size:18px">' + (p.viral_score ?? '—') + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">คอมมิชชั่น</div><div class="detail-value">' + esc(p.commission||'—') + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">หมวดหมู่</div><div class="detail-value"><span class="badge badge-yellow">' + esc(p.category||'อื่นๆ') + '</span></div></div>' +
    '<div class="detail-row"><div class="detail-label">แนวโน้ม</div><div class="detail-value">' + (p.trending ? '🔥 กำลังมาแรง' : '❄️ ทั่วไป') + '</div></div>' +
    '<div class="detail-row"><div class="detail-label">ลิงก์</div><div class="detail-value"><a href="' + escAttr(p.link || p.url || '') + '" target="_blank" rel="noopener">🔗 เปิดใน TikTok</a></div></div>' +
    '<div class="detail-row"><div class="detail-label">คำค้น</div><div class="detail-value"><div class="kw-list">' + kwHtml + '</div></div></div>';
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('productModal').classList.add('open');
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function skelRows(count) {
  var h = '';
  for (var i = 0; i < count; i++) h += '<div class="skel skel-row"></div>';
  return h;
}

function showError(containerId, msg, retryFn) {
  var el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '<div class="alert alert-error">' +
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> ' +
    msg + ' ' +
    '<button class="btn btn-outline btn-sm" onclick="(' + retryFn + ')()">ลองอีกครั้ง</button>' +
    '</div>';
}

function renderTableSkel(tbodyId, cols) {
  var tbody = document.getElementById(tbodyId);
  if (!tbody) return;
  var h = '';
  for (var i = 0; i < 5; i++) {
    h += '<tr>';
    for (var j = 0; j < cols; j++) {
      h += '<td><div class="skel skel-h" style="height:14px"></div></td>';
    }
    h += '</tr>';
  }
  tbody.innerHTML = h;
}

function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('th-TH'); } catch(e) { return '—'; }
}

function fmtPrice(v) {
  if (v == null || v === '') return '—';
  var n = Number(v);
  return isNaN(n) ? '—' : '฿' + n.toLocaleString();
}

function platformIcon(src) {
  var s = (src || '').toLowerCase();
  if (s.includes('shopee')) return '🛒';
  if (s.includes('lazada')) return '📦';
  if (s.includes('tiktok')) return '🎵';
  if (s.includes('amazon')) return '📘';
  if (s.includes('facebook')) return '👍';
  return '📄';
}

async function loadChips() {
  var container = document.getElementById('chipsContainer');
  container.innerHTML = '<div class="chips-skel"><div class="skel skel-chip"></div><div class="skel skel-chip"></div><div class="skel skel-chip"></div><div class="skel skel-chip"></div></div>';
  try {
    var statsR = fetch(API + '/analyze/stats');
    var scrapedR = fetch(API + '/analyze/scraped-products?limit=1');
    var results = await Promise.all([statsR, scrapedR]);
    var stats = await results[0].json();
    var scraped = await results[1].json();
    var total = stats.total ?? 0;
    var avgViral = stats.avg_viral_score;
    if (avgViral == null) avgViral = '—';
    var trendCount = stats.trending_count ?? 0;
    var scrapedCount = scraped.total ?? 0;
    container.innerHTML =
      '<div class="chips-grid">' +
        '<div class="chip"><div class="chip-label">📥 ข้อมูลดิบ (Scraped)</div><div class="chip-value accent">' + scrapedCount + '</div></div>' +
        '<div class="chip"><div class="chip-label">🔬 วิเคราะห์แล้ว (Analyzed)</div><div class="chip-value">' + total + '</div></div>' +
        '<div class="chip"><div class="chip-label">💥 คะแนนไวรัลเฉลี่ย</div><div class="chip-value yellow">' + avgViral + '</div></div>' +
        '<div class="chip"><div class="chip-label">🔥 กำลังมาแรง</div><div class="chip-value green">' + trendCount + '</div></div>' +
      '</div>';
  } catch(e) {
    container.innerHTML =
      '<div class="chips-grid">' +
        '<div class="chip"><div class="chip-label">📥 ข้อมูลดิบ (Scraped)</div><div class="chip-value accent">—</div></div>' +
        '<div class="chip"><div class="chip-label">🔬 วิเคราะห์แล้ว (Analyzed)</div><div class="chip-value">—</div></div>' +
        '<div class="chip"><div class="chip-label">💥 คะแนนไวรัลเฉลี่ย</div><div class="chip-value yellow">—</div></div>' +
        '<div class="chip"><div class="chip-label">🔥 กำลังมาแรง</div><div class="chip-value green">—</div></div>' +
      '</div>';
  }
}

async function loadRaw() {
  var tbody = document.getElementById('rawBody');
  var empty = document.getElementById('rawEmpty');
  var alertDiv = document.getElementById('rawAlert');
  renderTableSkel('rawBody', 8);
  empty.style.display = 'none';
  alertDiv.innerHTML = '';
  try {
    var src = document.getElementById('srcFilter').value;
    var search = document.getElementById('srcSearch').value.trim();
    var url = API + '/analyze/scraped-products';
    var params = [];
    if (src) params.push('source_site=' + encodeURIComponent(src));
    if (search) params.push('search=' + encodeURIComponent(search));
    if (params.length) url += '?' + params.join('&');
    var r = await fetch(url);
    var d = await r.json();
    rawData = d.products || [];
    tbody.innerHTML = '';
    if (!d.success || !d.products || d.products.length === 0) {
      empty.style.display = 'block'; return;
    }
    d.products.forEach(function(p, i) {
      var tr = document.createElement('tr');
      var hasAn = p.has_analyzed;
      tr.dataset.ri = i;
      tr.onclick = function(e) {
        if (e.target.closest('input') || e.target.closest('button')) return;
        showRawModal(rawData[parseInt(this.dataset.ri)]);
      };
      tr.innerHTML =
        '<td style="cursor:default"><input type="checkbox" class="raw-check" data-id="' + (p.id||'') + '"></td>' +
        '<td><strong>' + esc(p.name||'—') + '</strong></td>' +
        '<td><span class="badge badge-teal">' + platformIcon(p.source_site) + ' ' + esc(p.source_site||'?') + '</span></td>' +
        '<td><code>' + esc(p.sku||'—') + '</code></td>' +
        '<td>' + fmtPrice(p.price) + '</td>' +
        '<td>' + (hasAn ? '<span class="badge badge-green">✔ วิเคราะห์แล้ว</span>' : '<span class="badge badge-yellow">⏳ รอวิเคราะห์</span>') + '</td>' +
        '<td>' + fmtDate(p.scraped_at) + '</td>' +
        '<td style="cursor:default">' + (hasAn ? '' : '<button class="badge badge-teal" style="border:none;cursor:pointer;padding:2px 8px" onclick="event.stopPropagation();analyzeOne(\''+(p.id||'')+'\')">วิเคราะห์</button>') + '</td>';
      tbody.appendChild(tr);
    });
  } catch(e) {
    showError('rawAlert', 'โหลดข้อมูลดิบล้มเหลว', 'loadRaw');
  }
}

async function analyzeOne(id) {
  var div = document.getElementById('rawAlert');
  div.innerHTML = '<div class="alert alert-info"><div class="spinner" style="width:14px;height:14px"></div> กำลังวิเคราะห์…</div>';
  try {
    var r = await fetch(API + '/analyze/from-scrape', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({source_site: document.getElementById('srcFilter').value || '', limit: 50})
    });
    var d = await r.json();
    if (d.success) {
      div.innerHTML = '<div class="alert alert-success">✅ วิเคราะห์ ' + (d.count||'') + ' รายการ</div>';
      loadRaw();
      loadAnalyzed();
      loadChips();
    } else {
      div.innerHTML = '<div class="alert alert-error">❌ ' + (d.message || 'ล้มเหลว') + '</div>';
    }
  } catch(e) {
    div.innerHTML = '<div class="alert alert-error">❌ ' + e.message + '</div>';
  }
}

async function analyzeAll() { await analyzeOne(''); }

function toggleAllRaw() {
  var c = document.getElementById('rawSelectAll').checked;
  document.querySelectorAll('.raw-check').forEach(function(cb){cb.checked=c});
}

async function loadAnalyzed() {
  var tbody = document.getElementById('anBody');
  var empty = document.getElementById('anEmpty');
  var alertDiv = document.getElementById('anAlert');
  renderTableSkel('anBody', 10);
  empty.style.display = 'none';
  alertDiv.innerHTML = '';
  try {
    var src = document.getElementById('anSrcFilter').value;
    var cat = document.getElementById('anCatFilter').value;
    var rating = document.getElementById('anMinRating').value;
    var trend = document.getElementById('anTrendFilter').value;
    var url = API + '/analyze/export?limit=200';
    if (src) url += '&source=' + encodeURIComponent(src);
    if (cat) url += '&category=' + encodeURIComponent(cat);
    if (rating) url += '&min_rating=' + rating;
    if (trend === 'trending') url += '&trending=true';
    else if (trend === 'notrending') url += '&trending=false';
    var r = await fetch(url);
    var d = await r.json();
    var products = d.products || [];
    anData = products;
    tbody.innerHTML = '';
    if (products.length === 0) { empty.style.display = 'block'; return; }
    var catSel = document.getElementById('anCatFilter');
    if (catSel.options.length <= 1) {
      var cats = new Set();
      products.forEach(function(p){if(p.category)cats.add(p.category)});
      cats.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;catSel.appendChild(o)});
    }
    products.forEach(function(p, i) {
      var tr = document.createElement('tr');
      tr.dataset.ai = i;
      tr.onclick = function() {
        showAnalyzedModal(anData[parseInt(this.dataset.ai)]);
      };
      var vc = p.viral_score >= 70 ? 'color:var(--green);font-weight:600' : p.viral_score >= 30 ? '' : 'color:var(--text2)';
      var kw = p.keywords ? p.keywords.slice(0,3).join(', ') : '';
      tr.innerHTML =
        '<td><strong>' + esc(p.title||'—') + '</strong>' + </td>' +
        '<td><span class="badge badge-teal">' + platformIcon(p.source) + ' ' + esc(p.source||'?') + '</span></td>' +
        '<td>' + fmtPrice(p.price_thb) + '</td>' +
        '<td>' + (p.rating ? '⭐' + p.rating : '—') + '</td>' +
        '<td>' + (p.sold_total ? Number(p.sold_total).toLocaleString() : '—') + '</td>' +
        '<td style="' + vc + '"><strong>' + (p.viral_score??0) + '</strong></td>' +
        '<td>' + esc(p.commission||'—') + '</td>' +
        '<td><span class="badge badge-yellow">' + esc(p.category||'อื่นๆ') + '</span></td>' +
        '<td>' + (p.trending ? '🔥' : '❄️') + '</td>' +
        '<td><small>' + esc(kw||'—') + '</small></td>';
      tbody.appendChild(tr);
    });
  } catch(e) {
    showError('anAlert', 'โหลดข้อมูลวิเคราะห์ล้มเหลว', 'loadAnalyzed');
  }
}

async function loadPlatformStats() {
  var container = document.getElementById('platformContent');
  container.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>กำลังโหลดสถิติ…</span></div>';
  try {
    var r = await fetch(API + '/analyze/export?limit=500');
    var d = await r.json();
    var products = d.products || [];
    var groups = {};
    products.forEach(function(p) {
      var src = p.source || 'อื่นๆ';
      if (!groups[src]) groups[src] = {total:0,viralSum:0,ratingSum:0,trendCount:0,priceSum:0};
      groups[src].total++;
      groups[src].viralSum += p.viral_score || 0;
      groups[src].ratingSum += p.rating || 0;
      if (p.trending) groups[src].trendCount++;
      groups[src].priceSum += p.price_thb || 0;
    });
    var entries = Object.entries(groups);
    if (entries.length === 0) {
      container.innerHTML = '<div class="empty-state"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><div>ไม่มีข้อมูล</div></div>';
      return;
    }
    var cardsHtml = '<div class="platform-cards">';
    entries.forEach(function(e) {
      var src = e[0], g = e[1];
      var avgV = (g.viralSum / g.total).toFixed(1);
      var avgR = (g.ratingSum / g.total).toFixed(1);
      var avgP = g.priceSum / g.total;
      cardsHtml +=
        '<div class="platform-card">' +
          '<div class="p-name">' + platformIcon(src) + ' ' + esc(src) + '</div>' +
          '<div class="p-count">' + g.total + '</div>' +
          '<div class="p-stats"><span>💥 ' + avgV + '</span><span>⭐ ' + avgR + '</span><span>🔥 ' + g.trendCount + '</span></div>' +
        '</div>';
    });
    cardsHtml += '</div>';
    container.innerHTML = cardsHtml;
  } catch(e) {
    container.innerHTML = '<div class="alert alert-error">❌ โหลดสถิติล้มเหลว <button class="btn btn-outline btn-sm" onclick="loadPlatformStats()">ลองอีกครั้ง</button></div>';
  }
}

async function refreshAll() {
  await Promise.all([loadChips(), loadRaw(), loadAnalyzed()]);
  var active = document.querySelector('.tab-panel.active');
  if (active && active.id === 'panel-platforms') loadPlatformStats();
}

document.addEventListener('DOMContentLoaded', function() {
  loadChips();
  loadRaw();
});
</script>
