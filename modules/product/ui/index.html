<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* ══════════════════════════════════
         Design System: Clean & Modern
         Inspired by Nutrition Tracking UI
         ══════════════════════════════════ */
      :root {
        --bg: #f5f7fa;
        --surface: #ffffff;
        --surface-alt: #f8fafc;
        --fg: #1a1d21;
        --fg-2: #5a5f6b;
        --fg-3: #969ca8;
        --border: #e8ecf1;
        --border-soft: #f0f2f5;

        /* Brand accent */
        --accent: #4a6cf7;
        --accent-soft: rgba(74,108,247,0.08);
        --accent-hover: #3b5de7;

        /* Metric colors — like macro colors */
        --color-kcal: #ff6b6b;
        --color-protein: #4a90d9;
        --color-fats: #f5a623;
        --color-carbs: #7ed321;
        --color-water: #4fc3f7;

        /* Typography */
        --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'SF Mono', 'IBM Plex Mono', 'Fira Code', monospace;
        --text-xs: 11px;
        --text-sm: 13px;
        --text-base: 15px;
        --text-lg: 17px;
        --text-xl: 20px;
        --text-2xl: 26px;
        --text-3xl: 34px;

        /* Space */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --space-10: 40px;
        --space-12: 48px;

        /* Radius */
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --radius-pill: 999px;

        /* Shadows */
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
        --shadow-lg: 0 12px 40px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);

        /* Transition */
        --fast: 150ms cubic-bezier(0.2, 0, 0, 1);
        --base: 250ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      *, *::before, *::after { box-sizing: border-box; }
      html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font);
        font-size: var(--text-base);
        line-height: 1.5;
      }

      /* ─── Scrollbar ─── */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--fg-3); }

      /* ─── App Shell ─── */
      .app { display: flex; flex-direction: column; min-height: 100vh; }

      /* ─── Top Header ─── */
      .topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: var(--space-4) var(--space-8);
        background: var(--surface);
        border-bottom: 1px solid var(--border-soft);
        position: sticky; top: 0; z-index: 50;
      }
      .topbar-brand {
        display: flex; align-items: center; gap: var(--space-3);
        font-weight: 700; font-size: var(--text-lg);
        color: var(--fg);
      }
      .topbar-brand .mark {
        width: 32px; height: 32px;
        background: linear-gradient(135deg, var(--accent), #7c5cfc);
        border-radius: var(--radius-sm);
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; color: #fff; font-weight: 700;
      }
      .topbar-actions { display: flex; align-items: center; gap: var(--space-3); }
      .topbar-status {
        display: inline-flex; align-items: center; gap: var(--space-2);
        font-size: var(--text-xs); font-weight: 600; color: var(--fg-3);
        padding: var(--space-1) var(--space-3);
        background: var(--surface-alt);
        border-radius: var(--radius-pill);
      }
      .topbar-status::before {
        width: 6px; height: 6px; border-radius: 50%;
        background: #4ade80; content: '';
      }
      .topbar-avatar {
        width: 34px; height: 34px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), #7c5cfc);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: var(--text-sm); font-weight: 600;
      }

      /* ─── Tabs (Calendar-style Nav) ─── */
      .tab-bar {
        display: flex;
        gap: var(--space-1);
        padding: var(--space-3) var(--space-8);
        background: var(--surface);
        border-bottom: 1px solid var(--border-soft);
        position: sticky; top: 57px; z-index: 49;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .tab-bar::-webkit-scrollbar { display: none; }
      .tab-item {
        display: flex; align-items: center; gap: var(--space-2);
        padding: var(--space-2) var(--space-4);
        border: none; background: none;
        font: 500 var(--text-sm)/1 var(--font);
        color: var(--fg-3);
        cursor: pointer;
        border-radius: var(--radius-pill);
        transition: all var(--fast);
        white-space: nowrap;
      }
      .tab-item:hover { color: var(--fg-2); background: var(--surface-alt); }
      .tab-item.active {
        color: var(--accent);
        background: var(--accent-soft);
        font-weight: 600;
      }
      .tab-item .badge {
        display: inline-flex; align-items: center; justify-content: center;
        min-width: 18px; height: 18px;
        padding: 0 5px;
        border-radius: var(--radius-pill);
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 10px; font-weight: 700;
      }

      /* ─── Main Content ─── */
      .content {
        flex: 1;
        padding: var(--space-6) var(--space-8);
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
      }

      /* ─── Page Toggle ─── */
      .page { display: none; }
      .page.active { display: block; }
      .page-title {
        font-size: var(--text-2xl);
        font-weight: 700;
        margin: 0 0 var(--space-1);
        color: var(--fg);
      }
      .page-subtitle {
        color: var(--fg-3);
        font-size: var(--text-sm);
        margin: 0 0 var(--space-6);
      }

      /* ══════════════════════════════════
         Components
         ══════════════════════════════════ */

      /* ─── Metric Row (Macro-style Cards) ─── */
      .metric-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .metric-card {
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-lg);
        padding: var(--space-4) var(--space-5);
        box-shadow: var(--shadow-sm);
        transition: all var(--fast);
        position: relative;
        overflow: hidden;
      }
      .metric-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
      }
      .metric-card.h-metric::before { background: var(--color-kcal); }
      .metric-card.h-method::before { background: var(--color-protein); }
      .metric-card.h-cost::before   { background: var(--color-fats); }
      .metric-card.h-cache::before  { background: var(--color-carbs); }
      .metric-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
      .metric-card .m-label {
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: var(--space-2);
      }
      .metric-card .m-value {
        font-size: var(--text-2xl);
        font-weight: 800;
        color: var(--fg);
        line-height: 1.1;
      }
      .metric-card .m-sub {
        font-size: var(--text-xs);
        color: var(--fg-3);
        margin-top: var(--space-1);
      }

      /* ─── Detailed Metric Cards (like macro cards) ─── */
      .metric-detailed-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }
      .metric-detailed {
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-lg);
        padding: var(--space-5);
        box-shadow: var(--shadow-sm);
      }
      .metric-detailed .md-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: var(--space-4);
      }
      .metric-detailed .md-label {
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .metric-detailed .md-icon {
        width: 36px; height: 36px;
        border-radius: var(--radius-sm);
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
      }
      .metric-detailed .md-value {
        font-size: var(--text-xl);
        font-weight: 800;
        margin-bottom: var(--space-2);
      }
      .metric-detailed .md-bar {
        width: 100%; height: 6px;
        background: var(--border-soft);
        border-radius: 3px;
        overflow: hidden;
      }
      .metric-detailed .md-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width var(--base);
      }

      /* ─── Card (Panel) ─── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-sm);
        margin-bottom: var(--space-5);
        overflow: hidden;
      }
      .card-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: var(--space-5) var(--space-6);
        border-bottom: 1px solid var(--border-soft);
      }
      .card-header h2 {
        margin: 0;
        font-size: var(--text-base);
        font-weight: 700;
      }
      .card-body { padding: var(--space-6); }
      .card-body-flush { padding: 0; }

      /* ─── Progress Ring ─── */
      .ring {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .ring svg { transform: rotate(-90deg); }
      .ring-bg { fill: none; stroke: var(--border-soft); }
      .ring-fg {
        fill: none;
        stroke-linecap: round;
        transition: stroke-dashoffset var(--base);
      }
      .ring-label {
        position: absolute;
        text-align: center;
      }
      .ring-label .ring-value {
        display: block;
        font-size: var(--text-lg);
        font-weight: 800;
        color: var(--fg);
        line-height: 1;
      }
      .ring-label .ring-unit {
        display: block;
        font-size: 9px;
        color: var(--fg-3);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-top: 2px;
      }

      /* ─── Water / Quota Tracker ─── */
      .water-tracker {
        display: flex; align-items: center; gap: var(--space-5);
        padding: var(--space-4) 0;
      }
      .water-tracker .wt-glass {
        width: 40px; height: 56px;
        border: 2px solid var(--color-water);
        border-radius: 6px 6px 10px 10px;
        position: relative;
        overflow: hidden;
        background: rgba(79,195,247,0.06);
        flex-shrink: 0;
      }
      .water-tracker .wt-glass .wt-fill {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        background: var(--color-water);
        transition: height var(--base);
        border-radius: 0 0 8px 8px;
      }
      .water-tracker .wt-info {
        flex: 1;
      }
      .water-tracker .wt-label {
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .water-tracker .wt-value {
        font-size: var(--text-lg);
        font-weight: 700;
        margin-top: 2px;
      }
      .water-tracker .wt-sub {
        font-size: var(--text-xs);
        color: var(--fg-3);
      }

      /* ─── Ring + Info Layout ─── */
      .ring-row {
        display: flex;
        align-items: center;
        gap: var(--space-6);
        flex-wrap: wrap;
      }
      .ring-col {
        display: flex;
        gap: var(--space-5);
        align-items: center;
      }

      /* ─── Product Card ─── */
      .product-card {
        display: flex;
        gap: var(--space-5);
        padding: var(--space-5);
        background: var(--surface-alt);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-md);
        margin-top: var(--space-4);
      }
      .product-card img {
        width: 80px; height: 80px;
        border-radius: var(--radius-sm);
        object-fit: cover;
        flex-shrink: 0;
      }
      .product-card .pc-info { flex: 1; }
      .product-card .pc-name {
        font-weight: 700;
        font-size: var(--text-base);
        margin-bottom: 4px;
      }
      .product-card .pc-price {
        font-weight: 800;
        font-size: var(--text-lg);
        color: var(--accent);
      }
      .product-card .pc-source {
        font-size: var(--text-xs);
        color: var(--fg-3);
        margin-top: 2px;
      }

      /* ─── Data Table ─── */
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: var(--text-sm);
      }
      .data-table th {
        text-align: left;
        padding: var(--space-3) var(--space-5);
        color: var(--fg-3);
        font-weight: 600;
        font-size: var(--text-xs);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-bottom: 1px solid var(--border);
        background: var(--surface-alt);
      }
      .data-table th:first-child { border-radius: var(--radius-sm) 0 0 0; }
      .data-table th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
      .data-table td {
        padding: var(--space-3) var(--space-5);
        border-bottom: 1px solid var(--border-soft);
        vertical-align: middle;
      }
      .data-table tr:last-child td:first-child { border-radius: 0 0 0 var(--radius-sm); }
      .data-table tr:last-child td:last-child { border-radius: 0 0 var(--radius-sm) 0; }
      .data-table tbody tr:hover { background: var(--surface-alt); }

      /* ─── Inputs ─── */
      .field { display: flex; flex-direction: column; gap: var(--space-2); }
      .field-row { display: flex; gap: var(--space-3); align-items: flex-end; }
      label {
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      input, select {
        width: 100%;
        min-height: 44px;
        padding: 0 var(--space-4);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--surface);
        color: var(--fg);
        font: 500 var(--text-sm)/1 var(--font);
        transition: all var(--fast);
        outline: none;
      }
      input:focus, select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      input::placeholder { color: var(--fg-3); }

      /* ─── Buttons ─── */
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
        min-height: 44px; padding: 0 var(--space-6);
        border: none; border-radius: var(--radius-md);
        font: 600 var(--text-sm)/1 var(--font);
        cursor: pointer;
        transition: all var(--fast);
        white-space: nowrap;
        text-decoration: none;
      }
      .btn:active { transform: scale(0.97); }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #7c5cfc);
        color: #fff;
        box-shadow: 0 4px 14px rgba(74,108,247,0.25);
      }
      .btn-primary:hover { box-shadow: 0 6px 20px rgba(74,108,247,0.35); transform: translateY(-1px); }
      .btn-secondary {
        background: var(--surface);
        color: var(--fg);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
      .btn-sm { min-height: 34px; padding: 0 var(--space-4); font-size: var(--text-xs); }
      .btn-danger { background: #ff4757; color: #fff; }
      .btn-danger:hover { background: #ff3838; }

      /* ─── Label Badge ─── */
      .badge-tag {
        display: inline-flex; align-items: center;
        padding: 2px 10px;
        border-radius: var(--radius-pill);
        font-size: 10px; font-weight: 600;
      }
      .badge-tag.bg-blue { background: rgba(74,144,217,0.12); color: #4a90d9; }
      .badge-tag.bg-green { background: rgba(126,211,33,0.12); color: #5fa81a; }
      .badge-tag.bg-orange { background: rgba(245,166,35,0.12); color: #c4840a; }
      .badge-tag.bg-red { background: rgba(255,107,107,0.12); color: #d94a4a; }

      /* ─── Status ─── */
      .status-dot {
        display: inline-flex; align-items: center; gap: var(--space-2);
        font-size: var(--text-xs); font-weight: 600;
      }
      .status-dot::before { width: 6px; height: 6px; border-radius: 50%; content: ''; }
      .status-dot.s-online::before { background: #4ade80; }
      .status-dot.s-off::before { background: var(--fg-3); }
      .status-dot.s-error::before { background: #ff4757; }

      /* ─── Key Box ─── */
      .key-box {
        display: flex; align-items: center; gap: var(--space-3);
        background: var(--surface-alt);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: var(--space-3) var(--space-4);
      }
      .key-box .key-value { flex: 1; font-family: var(--font-mono); font-size: var(--text-xs); color: var(--accent); word-break: break-all; }
      .key-box .key-copy { cursor: pointer; color: var(--fg-3); padding: 4px 8px; border-radius: var(--radius-sm); transition: var(--fast); font-size: var(--text-sm); }
      .key-box .key-copy:hover { background: var(--accent-soft); color: var(--accent); }

      /* ─── Utility ─── */
      .mono { font-family: var(--font-mono); }
      .text-muted { color: var(--fg-3); }
      .hidden { display: none !important; }
      .mt-4 { margin-top: var(--space-4); }
      .mb-4 { margin-bottom: var(--space-4); }
      .flex { display: flex; }
      .flex-center { align-items: center; }
      .gap-3 { gap: var(--space-3); }

      /* ─── JSON Viewer ─── */
      .json-box {
        background: var(--surface-alt);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 350px;
        overflow: auto;
        margin-top: var(--space-4);
      }

      /* ─── Spinner ─── */
      .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; vertical-align: middle; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ─── Toast ─── */
      .toast {
        position: fixed; bottom: var(--space-6); right: var(--space-6);
        background: var(--fg); color: var(--surface);
        padding: var(--space-3) var(--space-5);
        border-radius: var(--radius-md);
        font-size: var(--text-sm); font-weight: 600;
        opacity: 0; transform: translateY(12px);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 1000;
        pointer-events: none;
        box-shadow: var(--shadow-lg);
      }
      .toast.show { opacity: 1; transform: translateY(0); }

      /* ─── Responsive ─── */
      @media (max-width: 860px) {
        .topbar { padding: var(--space-3) var(--space-4); }
        .tab-bar { padding: var(--space-2) var(--space-4); gap: var(--space-1); }
        .content { padding: var(--space-4); }
        .metric-row { grid-template-columns: repeat(2, 1fr); }
        .metric-detailed-row { grid-template-columns: repeat(2, 1fr); }
        .ring-row { flex-direction: column; align-items: flex-start; }
      }
      @media (max-width: 480px) {
        .metric-row { grid-template-columns: 1fr 1fr; }
        .metric-detailed-row { grid-template-columns: 1fr; }
        .topbar-status { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-brand">
          <span class="mark">⛏</span>
          Product Scraper
        </div>
        <div class="topbar-actions">
          <span class="topbar-status">All systems normal</span>
          <div class="topbar-avatar">P</div>
        </div>
      </header>

      <!-- Tab Navigation (Calendar-style) -->
      <nav class="tab-bar" id="tab-bar">
        <button class="tab-item active" data-page="dashboard">
          📊 Dashboard
        </button>
        <button class="tab-item" data-page="scraper">
          🔍 Scraper
        </button>
        <button class="tab-item" data-page="keys">
          🔑 API Keys
        </button>
        <button class="tab-item" data-page="pricing">
          💰 Pricing
        </button>
        <button class="tab-item" data-page="settings">
          ⚙️ Settings
        </button>
      </nav>

      <!-- Content -->
      <main class="content" id="app-content">
        <!-- Pages rendered by JS -->
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    /* ═══════════════════════════════════
       Core
       ═══════════════════════════════════ */
    const API = '';
    const USER_ID = 'demo';
    let API_KEY = localStorage.getItem('scraper_key') || ''; // fixed

    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function htmlEscape(s) {
      if (s == null) return '-';
      const d = document.createElement('div');
      d.textContent = String(s).slice(0, 5000);
      return d.innerHTML;
    }

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json', 'x-user-id': USER_ID } };
      if (API_KEY) opts.headers['Authorization'] = `Bearer ${API_KEY}`;
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${API}${path}`, opts);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || data.error || 'Request failed');
      return data;
    }

    function saveKeyToLS(key) {
      API_KEY = key;
      try { localStorage.setItem('scraper_key', key); } catch(e) {}
    }

    /* ═══════════════════════════════════
       Router
       ═══════════════════════════════════ */
    let currentPage = 'dashboard';

    function navigate(page) {
      currentPage = page;
      $$('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.page === page));
      const content = document.getElementById('app-content');
      content.innerHTML = '';

      switch (page) {
        case 'dashboard': renderDashboard(content); break;
        case 'scraper': renderScraper(content); break;
        case 'keys': renderKeys(content); break;
        case 'pricing': renderPricing(content); break;
        case 'settings': renderSettings(content); break;
      }
    }

    $$('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => navigate(tab.dataset.page));
    });

    /* ═══════════════════════════════════
       Progress Ring
       ═══════════════════════════════════ */
    function progressRing(pct, color, size = 56, stroke = 5) {
      const r = (size - stroke) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ * (1 - Math.min(Math.max(pct, 0), 1));
      return `
        <div class="ring" style="width:${size}px;height:${size}px">
          <svg width="${size}" height="${size}">
            <circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}"/>
            <circle class="ring-fg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}" stroke="${color}"
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}" />
          </svg>
          <div class="ring-label">
            <span class="ring-value" style="font-size:${size*0.28}px">${Math.round(pct*100)}%</span>
            <span class="ring-unit">used</span>
          </div>
        </div>`;
    }

    /* ═══════════════════════════════════
       Dashboard Page
       ═══════════════════════════════════ */

        <div id="dash-metrics"><div style="display:flex;gap:var(--space-3);padding:var(--space-6)"><span class="spinner"></span> Loading metrics…</div></div>

        // Quota ring + API key status — like the nutrition progress rings

        document.getElementById('dash-quick').innerHTML = `
          <div class="card">

                  </div>
                </div>
                <div class="ring-col">
                  ${progressRing(Math.min(activeKeys/5, 1), 'var(--color-protein)', 68, 6)}

                </div>
                <div class="ring-col">
                  <div class="water-tracker">
                    <div class="wt-glass">
                      <div class="wt-fill" style="height:${pct*100}%"></div>
                    </div>
                    <div class="wt-info">
                      <div class="wt-label">Used Today</div>
                      <div class="wt-value">${recent.filter(l=>new Date(l.created_at)>Date.now()-86400000).length}</div>
                      <div class="wt-sub">scrapes</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>`;

        // Recent scrapes table
        document.getElementById('dash-recent').innerHTML = `
          <div class="card">
            <div class="card-header">
              <h2>📋 Recent Activity</h2>
              ${recent.length ? `<span class="text-muted" style="font-size:var(--text-xs)">${recent.length} entries</span>` : ''}
            </div>
            ${recent.length ? `
            <div style="overflow-x:auto">
              <table class="data-table">
                <thead><tr><th>URL</th><th>Method</th><th>Cost</th><th>Status</th><th>When</th></tr></thead>
                <tbody>
                  ${recent.slice(0,20).map(l => `
                  <tr>
                    <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${htmlEscape(l.url)}">${htmlEscape(l.url)}</td>

                  </tr>`).join('')}
                </tbody>
              </table>

      } catch(e) {

    /* ═══════════════════════════════════
       Scraper Page
       ═══════════════════════════════════ */
    function renderScraper(c) {
      if (!API_KEY) {

    async function doScrape() {
      const url = document.getElementById('s-url').value.trim();
      if (!url) return toast('Please enter a URL');
      const use_vision = document.getElementById('s-vision').value === 'true';

      const btn = document.getElementById('s-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Scraping…';

      const resultDiv = document.getElementById('s-result');
      resultDiv.innerHTML = `<div class="card"><div class="card-body" style="display:flex;align-items:center;gap:var(--space-3)"><span class="spinner"></span> Extracting product data from <strong>${htmlEscape(url)}</strong>…</div></div>`;

      try {
        const d = await api('POST', '/api/v1/scrape', { url, use_vision });
        const p = d.product || {};

        if (d.success) {
          const pct = d.cached ? 1 : 0.6;
          resultDiv.innerHTML = `
            <div class="card">
              <div class="card-header">
                <h2>📦 ${htmlEscape(p.name || 'Product Results')}</h2>
                <div style="display:flex;gap:var(--space-2);align-items:center">
                  <span class="badge-tag ${d.cached ? 'bg-green' : 'bg-blue'}">${d.cached ? 'Cached' : d.method}</span>
                  <span class="status-dot s-online">${d.cached ? 'Free' : '฿'+(d.cost||'0.00')}</span>
                </div>
              </div>
              <div class="card-body">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6)">
                  <div>
                    <div style="display:grid;grid-template-columns:120px 1fr;gap:var(--space-2) var(--space-3);font-size:var(--text-sm)">
                      <span class="text-muted">Name</span>
                      <span><strong>${htmlEscape(p.name)}</strong></span>
                      <span class="text-muted">Price</span>
                      <span style="font-size:var(--text-lg);font-weight:800;color:var(--accent)">${p.price != null ? '฿'+htmlEscape(p.price) : '-'}</span>
                      <span class="text-muted">Brand</span>
                      <span>${htmlEscape(p.brand || '-')}</span>
                      <span class="text-muted">Source</span>
                      <span>${htmlEscape(p.source_site || '-')}</span>
                      <span class="text-muted">SKU</span>
                      <span class="mono" style="font-size:11px">${htmlEscape(p.sku || '-')}</span>
                      <span class="text-muted">Description</span>
                      <span class="text-muted" style="max-width:350px">${htmlEscape((p.description||'').slice(0,250))}</span>
                    </div>
                  </div>
                  <div>
                    <div style="font-size:var(--text-xs);font-weight:600;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:var(--space-3)">
                      Images (${(p.images||[]).length})
                    </div>
                    <div style="display:flex;gap:var(--space-2);flex-wrap:wrap">
                      ${(p.images||[]).slice(0,8).map(img => `<img src="${htmlEscape(img)}" style="width:72px;height:72px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border)" onerror="this.style.display='none'">`).join('') || '<span class="text-muted">No images</span>'}
                    </div>
                    ${p.images?.length > 0 ? `
                    <div style="margin-top:var(--space-4)">
                      <span class="badge-tag bg-blue">${(p.images||[]).length} images</span>
                      <span class="badge-tag bg-orange" style="margin-left:var(--space-1)">${d.method}</span>
                      ${d.remaining_quota != null ? `<span class="badge-tag bg-green">${d.remaining_quota} remaining</span>` : ''}
                    </div>` : ''}
                  </div>
                </div>
                <div class="json-box">${htmlEscape(JSON.stringify(d, null, 2))}</div>
              </div>
            </div>`;
        } else {
          resultDiv.innerHTML = `<div class="card"><div class="card-body" style="color:#ff4757">❌ ${htmlEscape(d.error || 'Scrape failed')}</div></div>`;
        }
      } catch(e) {
        resultDiv.innerHTML = `<div class="card"><div class="card-body" style="color:#ff4757">❌ ${htmlEscape(e.message)}</div></div>`;
      }

      btn.disabled = false;
      btn.textContent = '▶ Scrape';
    }

       Keys Page

    async function createKey() {
      const name = document.getElementById('nk-name').value.trim() || 'API Key';
      try {
        const d = await api('POST', '/api/v1/keys/create', { name });
        if (d.success) {
          document.getElementById('new-key-panel').classList.remove('hidden');
          document.getElementById('nk-value').textContent = d.key;
          saveKeyToLS(d.key);
          toast('✅ Key created!');
          // Refresh the key list
          const kd = await api('GET', '/api/v1/keys/list');
          const list = document.getElementById('key-list');
          const keys = kd.keys || [];
          // re-render
          list.innerHTML = keys.length ? `<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Name</th><th>Key</th><th>Status</th><th>Usage</th><th>Created</th><th></th></tr></thead><tbody>

          </tbody></table></div>` : '<div style="padding:var(--space-8);text-align:center;color:var(--fg-3)">No keys yet.</div>';
        }
      } catch(e) { toast('❌ '+e.message); }
    }

    async function revokeKey(id) {
      try {
        const d = await api('POST', '/api/v1/keys/revoke', { key_id: id });
        if (d.success) { toast('🔑 Key revoked'); navigate('keys'); }
      } catch(e) { toast('❌ '+e.message); }
    }

    function copyNewKey() {
      const val = document.getElementById('nk-value').textContent;
      navigator.clipboard.writeText(val).then(() => toast('📋 Copied!'));
    }

    }
