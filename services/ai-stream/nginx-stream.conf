# AI Live Stream — Nginx reverse proxy config
# รวม AI Backend API + SRS HLS + Overlay
# วางใน /etc/nginx/sites-enabled/ai-stream.m2igen.com

server {
    listen 80;
    server_name ai-stream.m2igen.com;

    # ===== AI Backend API =====
    location /api/ {
        proxy_pass http://127.0.0.1:8150;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ===== WebSocket for Live Chat =====
    location /ws/ {
        proxy_pass http://127.0.0.1:8150;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ===== OBS Overlay =====
    location /overlay {
        proxy_pass http://127.0.0.1:8150;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===== TTS Audio Files =====
    location /api/tts/audio/ {
        proxy_pass http://127.0.0.1:8150;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ===== HLS Stream (from SRS) =====
    location /hls/ {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # CORS for HLS.js
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        
        # Cache HLS segments
        expires 30s;
        add_header Cache-Control "public";
    }

    # ===== FLV Stream (low latency) =====
    location /flv/ {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ===== SRS HTTP API (admin only) =====
    location /srs-api/ {
        proxy_pass http://127.0.0.1:1987/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ===== Stream Player Page =====
    location / {
        root /var/www/ai-stream;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
