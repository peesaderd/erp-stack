# SRS (Simple Realtime Server) Config
# RTMP → HLS + HTTP-FLV + WebRTC
# CPU-only, zero GPU

listen 1935;
max_connections 1000;

# HTTP API
http_api {
    enabled on;
    listen 1985;
}

# HTTP Server (for HLS)
http_server {
    enabled on;
    listen 8080;
    dir ./objs/nginx/html;
}

# RTMP ingest from OBS
vhost __defaultVhost__ {
    # HLS output
    hls {
        enabled on;
        hls_fragment 2;
        hls_window 30;
        hls_path ./objs/nginx/html/hls;
        hls_m3u8_file live/stream.m3u8;
        hls_ts_file live/stream-[seq].ts;
        hls_cleanup on;
        hls_dispose 60;
    }

    # HTTP-FLV for low latency
    http_remux {
        enabled on;
        mount [vhost]/[app]/[stream].flv;
    }

    # DVR (auto-record streams)
    dvr {
        enabled off;
    }

    # WebRTC support
    rtc {
        enabled on;
        #rtmp_to_rtc on;
        #rtc_to_rtmp on;
    }

    # Security: require stream key
    token_traverse {
        enabled on;
        # publisher token check is done via app name
    }

    # Reduce latency
    gop_cache off;
    queue_length 100;
    min_latency on;
    tcp_nodelay on;
}
