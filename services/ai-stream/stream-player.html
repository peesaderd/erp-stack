<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Live Stream</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, 'Noto Sans Thai', sans-serif;
    background: #0a0a0f;
    color: #e2e8f0;
    min-height: 100vh;
}

.header {
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.header h1 { font-size: 28px; color: #60a5fa; }
.header p { color: #94a3b8; margin-top: 4px; }

.stream-container {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 20px;
}

.video-wrapper {
    position: relative;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 16/9;
    border: 1px solid rgba(255,255,255,0.1);
}
.video-wrapper video {
    width: 100%;
    height: 100%;
    display: block;
}
.stream-status {
    position: absolute;
    top: 16px;
    left: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.7);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
}
.live-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ef4444;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}
.status-offline .live-dot { background: #64748b; animation: none; }

.chat-section {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 20px;
}

.chat-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px;
    height: 500px;
    display: flex;
    flex-direction: column;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.chat-message {
    padding: 10px 14px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
}
.chat-message .name {
    color: #60a5fa;
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 2px;
}
.chat-message.ai {
    background: rgba(96,165,250,0.1);
    border-left: 3px solid #60a5fa;
}
.chat-message.ai .name { color: #34d399; }

.chat-input-row {
    display: flex;
    gap: 8px;
}
.chat-input-row input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
}
.chat-input-row input:focus {
    border-color: #60a5fa;
}
.chat-input-row button {
    background: #60a5fa;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
}
.chat-input-row button:hover { background: #3b82f6; }
.chat-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

.qa-sidebar {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px;
}
.qa-sidebar h3 {
    color: #60a5fa;
    font-size: 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.qa-item {
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    margin-bottom: 8px;
}
.qa-item .q { color: #94a3b8; font-size: 13px; margin-bottom: 4px; }
.qa-item .a { color: #e2e8f0; font-size: 14px; font-weight: 500; }

@media (max-width: 768px) {
    .chat-section { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="header">
    <h1>🎙️ AI Live Stream</h1>
    <p>ถาม-ตอบสดด้วย AI จากฐานความรู้</p>
</div>

<div class="stream-container">
    <div class="video-wrapper" id="videoWrapper">
        <video id="video" controls muted autoplay playsinline></video>
        <div class="stream-status" id="streamStatus">
            <span class="live-dot"></span>
            <span id="statusText">กำลังเชื่อมต่อ...</span>
        </div>
    </div>
</div>

<div class="chat-section">
    <div class="chat-box">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="พิมพ์คำถามที่นี่..." onkeydown="if(event.key==='Enter') sendQuestion()">
            <button id="sendBtn" onclick="sendQuestion()">ส่ง</button>
        </div>
    </div>
    <div class="qa-sidebar">
        <h3>📋 คำถาม-คำตอบล่าสุด</h3>
        <div id="qaList"></div>
    </div>
</div>

<script>
// === HLS Player ===
const video = document.getElementById('video');
const statusText = document.getElementById('statusText');
const streamStatus = document.getElementById('streamStatus');

function initHLS() {
    const streamUrl = '/hls/live/stream.m3u8';
    if (Hls.isSupported()) {
        const hls = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
        });
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
            statusText.textContent = '📡 LIVE';
            streamStatus.classList.remove('status-offline');
        });
        hls.on(Hls.Events.ERROR, (e, data) => {
            if (data.fatal) {
                statusText.textContent = '⏸️ ออฟไลน์ (รอสตรีม...)';
                streamStatus.classList.add('status-offline');
                setTimeout(initHLS, 5000);
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
        video.addEventListener('loadedmetadata', () => {
            video.play().catch(() => {});
            statusText.textContent = '📡 LIVE';
        });
    }
}
initHLS();

// === WebSocket Chat ===
const wsUrl = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws/live/stream_web`;
let ws = null;
const chatMessages = document.getElementById('chatMessages');
const qaList = document.getElementById('qaList');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const sessionId = 'stream_' + Date.now();

function connectWS() {
    ws = new WebSocket(`${wsUrl.replace('stream_web', sessionId)}`);
    
    ws.onopen = () => {
        addMessage('system', 'ระบบ', 'เชื่อมต่อแล้ว! พิมพ์คำถามได้เลย');
    };
    
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        handleMessage(data);
    };
    
    ws.onclose = () => {
        setTimeout(connectWS, 3000);
    };
}

function handleMessage(data) {
    if (data.type === 'chunk') {
        updateLastAI(data.text);
    } else if (data.type === 'answer') {
        finalizeAnswer(data);
    } else if (data.type === 'status') {
        addMessage('system', data.user || 'ระบบ', data.text);
    } else if (data.type === 'error') {
        addMessage('system', 'ระบบ', '⚠️ ' + data.text);
    } else if (data.type === 'pong') {
        // ignore
    }
}

function sendQuestion() {
    const text = chatInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    
    chatInput.value = '';
    sendBtn.disabled = true;
    
    addMessage('user', 'คุณ', text);
    
    ws.send(JSON.stringify({
        type: 'question',
        text: text,
        user: 'ผู้ชม',
        tts: false,
    }));
    
    // Add placeholder
    const aiMsg = addMessage('ai', 'AI', '');
    aiMsg.dataset.typing = 'true';
}

function updateLastAI(text) {
    const msgs = chatMessages.querySelectorAll('.chat-message');
    const last = msgs[msgs.length - 1];
    if (last && last.dataset.typing) {
        last.querySelector('.text').textContent = text;
    }
}

function finalizeAnswer(data) {
    sendBtn.disabled = false;
    const msgs = chatMessages.querySelectorAll('.chat-message');
    const last = msgs[msgs.length - 1];
    if (last) {
        delete last.dataset.typing;
    }
    
    // Add to Q&A sidebar
    const qItems = qaList.querySelectorAll('.qa-item');
    const questionEl = qItems.length > 0 ? qItems[0] : null;
    const questionText = chatMessages.querySelector('.chat-message.user:last-child .text');
    
    const item = document.createElement('div');
    item.className = 'qa-item';
    item.innerHTML = `<div class="q">💬 ${questionText ? questionText.textContent : '?'}</div>
                      <div class="a">${data.text}</div>`;
    qaList.prepend(item);
    
    while (qaList.children.length > 5) {
        qaList.removeChild(qaList.lastChild);
    }
}

function addMessage(type, name, text) {
    const msg = document.createElement('div');
    msg.className = `chat-message ${type === 'ai' ? 'ai' : ''}`;
    msg.innerHTML = `<div class="name">${type === 'system' ? '🔵' : type === 'ai' ? '🤖' : '👤'} ${name}</div>
                     <div class="text">${text}</div>`;
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return msg;
}

connectWS();
</script>
</body>
</html>
