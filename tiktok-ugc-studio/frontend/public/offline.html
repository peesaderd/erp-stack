<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7f56d9" />
  <title>Offline — Business OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f9fafb; color: #1f2937; padding: 2rem;
    }
    .card { text-align: center; max-width: 400px; }
    .icon { width: 80px; height: 80px; margin: 0 auto 1.5rem; background: #7f56d9; border-radius: 24px; display: flex; align-items: center; justify-content: center; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #6b7280; line-height: 1.6; }
    .btn {
      display: inline-block; margin-top: 1.5rem; padding: 0.75rem 1.5rem;
      background: #7f56d9; color: white; border-radius: 8px;
      text-decoration: none; font-size: 0.875rem; font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Business OS needs an internet connection to work. Check your connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
